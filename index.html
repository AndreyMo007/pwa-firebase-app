<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="3D Brawl Arena">
  <meta name="screen-orientation" content="landscape">
  <title>3D Brawl Arena</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #000; overflow: hidden; touch-action: none; 
      user-select: none; -webkit-user-select: none; 
      height: 100vh; width: 100vw; font-family: 'Arial', sans-serif;
      position: fixed; top: 0; left: 0;
    }
    
    .welcome-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; width: 100vw; text-align: center;
      background: linear-gradient(135deg, #1a0033 0%, #0a0a2e 50%, #001a33 100%);
      color: white; padding: 20px; position: fixed; top: 0; left: 0; z-index: 999;
    }
    .welcome-screen .logo { font-size: 80px; animation: bounce 1.5s infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-25px)} }
    .welcome-screen h1 { font-size: 2.5rem; background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 15px 0; }
    .welcome-screen p { opacity: 0.8; margin-bottom: 20px; font-size: 1rem; }
    .install-btn { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: white; padding: 15px 40px; border-radius: 50px; font-size: 1.1rem; font-weight: 700; cursor: pointer; border: none; box-shadow: 0 10px 30px rgba(255,107,107,0.4); animation: pulse 2s infinite; margin-bottom: 10px; }
    @keyframes pulse { 0%,100%{box-shadow:0 8px 25px rgba(255,107,107,0.4)} 50%{box-shadow:0 8px 45px rgba(255,107,107,0.8)} }
    .open-btn { background: transparent; color: #ffd93d; padding: 12px 25px; border-radius: 50px; font-size: 0.9rem; cursor: pointer; border: 2px solid #ffd93d; }
    
    #gameContainer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
    canvas { display: block; width: 100%; height: 100%; }
    
    .ui-top {
      position: absolute; top: 10px; left: 15px; right: 15px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 10; pointer-events: none;
    }
    .hp-bar { width: 140px; height: 14px; background: rgba(0,0,0,0.6); border-radius: 10px; overflow: hidden; border: 2px solid rgba(255,255,255,0.5); }
    .hp-fill { height: 100%; background: linear-gradient(90deg, #ff4444, #ff8800, #00ff00); transition: width 0.3s; }
    .score-display { color: #ffd93d; font-size: 16px; font-weight: bold; text-shadow: 0 0 10px rgba(255,217,61,0.5); }
    .timer { color: white; font-size: 18px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 12px; }
    
    /* ДЖОЙСТИКИ — ПОДНЯТЫ ВЫШЕ */
    .joystick {
      position: absolute; bottom: 120px; width: 120px; height: 120px; z-index: 20;
    }
    #moveJoystick { left: 30px; }
    #attackJoystick { right: 30px; }
    
    /* СИНИЙ ДЖОЙСТИК ДЛЯ ДВИЖЕНИЯ */
    #moveJoystick .joystick-base {
      width: 100%; height: 100%; background: rgba(68, 136, 255, 0.15);
      border-radius: 50%; border: 3px solid rgba(68, 136, 255, 0.5); position: relative;
      box-shadow: 0 0 20px rgba(68, 136, 255, 0.2);
    }
    #moveJoystick .joystick-thumb {
      width: 50px; height: 50px; background: rgba(68, 136, 255, 0.7);
      border-radius: 50%; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); border: 2px solid #4488ff;
      box-shadow: 0 0 15px rgba(68, 136, 255, 0.5); pointer-events: none;
    }
    
    /* КРАСНЫЙ ДЖОЙСТИК ДЛЯ АТАКИ */
    #attackJoystick .joystick-base {
      width: 100%; height: 100%; background: rgba(255, 68, 68, 0.15);
      border-radius: 50%; border: 3px solid rgba(255, 68, 68, 0.5); position: relative;
      box-shadow: 0 0 20px rgba(255, 68, 68, 0.2);
    }
    #attackJoystick .joystick-thumb {
      width: 50px; height: 50px; background: rgba(255, 68, 68, 0.7);
      border-radius: 50%; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); border: 2px solid #ff4444;
      box-shadow: 0 0 15px rgba(255, 68, 68, 0.5); pointer-events: none;
    }
    
    .joystick-label {
      position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
      font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
    }
    #moveJoystick .joystick-label { color: rgba(68, 136, 255, 0.8); }
    #attackJoystick .joystick-label { color: rgba(255, 68, 68, 0.8); }
    
    /* ИНДИКАТОР АКТИВНОСТИ */
    .joystick.active .joystick-base {
      border-color: rgba(255,255,255,0.8) !important;
      box-shadow: 0 0 30px rgba(255,255,255,0.3) !important;
    }
    
    .game-over {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 100;
      flex-direction: column; align-items: center; justify-content: center;
      color: white; text-align: center;
    }
    .game-over h2 { font-size: 3rem; margin-bottom: 10px; }
    .game-over .final-score { font-size: 2rem; color: #ffd93d; margin-bottom: 20px; }
    .game-over button { background: linear-gradient(135deg, #6bcb77, #4d96ff); color: white; padding: 15px 40px; border-radius: 50px; font-size: 1.2rem; cursor: pointer; border: none; font-weight: 700; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ПРИВЕТСТВИЕ -->
  <div id="welcomeScreen" class="welcome-screen">
    <div class="logo">⚔️</div>
    <h1>3D Brawl Arena</h1>
    <p>Синий — движение | Красный — атака</p>
    <button id="installBtn" class="install-btn hidden" onclick="installApp()">📲 Установить игру</button>
    <button id="openBtn" class="open-btn hidden" onclick="startGame()">🎮 Играть в браузере</button>
    <p style="margin-top:12px;opacity:0.4;font-size:0.8rem;">Поверните телефон горизонтально</p>
  </div>

  <!-- ИГРА -->
  <div id="gameContainer">
    <div class="ui-top">
      <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width:100%"></div></div>
      <div class="timer" id="timer">2:00</div>
      <div class="score-display" id="scoreDisplay">🏆 0</div>
    </div>
    
    <!-- СИНИЙ ДЖОЙСТИК ДВИЖЕНИЯ -->
    <div class="joystick" id="moveJoystick">
      <div class="joystick-label">ДВИЖЕНИЕ</div>
      <div class="joystick-base" id="moveBase">
        <div class="joystick-thumb" id="moveThumb"></div>
      </div>
    </div>
    
    <!-- КРАСНЫЙ ДЖОЙСТИК АТАКИ -->
    <div class="joystick" id="attackJoystick">
      <div class="joystick-label">АТАКА</div>
      <div class="joystick-base" id="attackBase">
        <div class="joystick-thumb" id="attackThumb"></div>
      </div>
    </div>
    
    <div class="game-over" id="gameOver">
      <h2 id="gameOverTitle">Победа!</h2>
      <div class="final-score" id="gameOverScore">🏆 0</div>
      <button onclick="restartGame()">Играть снова</button>
    </div>
  </div>

  <script>
    // ========== PWA ==========
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); deferredPrompt = e;
      document.getElementById('installBtn').classList.remove('hidden');
    });
    
    window.installApp = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') document.getElementById('installBtn').classList.add('hidden');
      deferredPrompt = null;
    };
    
    window.addEventListener('appinstalled', () => {
      document.getElementById('installBtn').classList.add('hidden');
      document.getElementById('openBtn').classList.remove('hidden');
    });

    function bootGame() {
      document.getElementById('welcomeScreen').classList.add('hidden');
      document.getElementById('gameContainer').style.display = 'block';
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }
      initGame();
    }

    if (isStandalone) {
      bootGame();
    } else {
      document.getElementById('welcomeScreen').style.display = 'flex';
      document.getElementById('openBtn').classList.remove('hidden');
    }

    window.startGame = bootGame;

    // ========== 3D ИГРА ==========
    let scene, camera, renderer;
    let player, enemies = [], bullets = [];
    let moveAngle = null, attackAngle = null;
    let score = 0, gameTime = 120, gameRunning = false, timerInterval;
    let playerHP = 120, maxHP = 120;
    let W, H;

    function initGame() {
      W = window.innerWidth; H = window.innerHeight;
      if (renderer) { renderer.dispose(); document.querySelectorAll('canvas').forEach(c => c.remove()); }
      enemies = []; bullets = []; score = 0; gameTime = 120; gameRunning = true; playerHP = maxHP;
      
      scene = new THREE.Scene();
      const bgCanvas = document.createElement('canvas');
      bgCanvas.width = 512; bgCanvas.height = 512;
      const bgCtx = bgCanvas.getContext('2d');
      const gradient = bgCtx.createLinearGradient(0, 0, 0, 512);
      gradient.addColorStop(0, '#87CEEB'); gradient.addColorStop(0.4, '#98FB98');
      gradient.addColorStop(0.6, '#228B22'); gradient.addColorStop(1, '#1a5c1a');
      bgCtx.fillStyle = gradient; bgCtx.fillRect(0, 0, 512, 512);
      scene.background = new THREE.CanvasTexture(bgCanvas);
      scene.fog = new THREE.Fog(0x87CEEB, 40, 100);
      
      camera = new THREE.PerspectiveCamera(55, W/H, 1, 500);
      camera.position.set(0, 50, 40); camera.lookAt(0, 0, 0);
      
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.getElementById('gameContainer').appendChild(renderer.domElement);
      
      const sun = new THREE.DirectionalLight(0xfff5e6, 1.2);
      sun.position.set(30, 40, 20); sun.castShadow = true;
      sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
      sun.shadow.camera.top = 60; sun.shadow.camera.bottom = -60;
      sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
      scene.add(sun);
      scene.add(new THREE.AmbientLight(0x6688aa, 0.6));
      
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 100),
        new THREE.MeshLambertMaterial({ color: 0x4CAF50 })
      );
      ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
      scene.add(ground);
      
      const obs = [
        {x:-18,z:-18},{x:18,z:18},{x:-18,z:18},{x:18,z:-18},
        {x:0,z:-25},{x:0,z:25},{x:-25,z:0},{x:25,z:0}
      ];
      obs.forEach(pos => {
        const rock = new THREE.Mesh(
          new THREE.DodecahedronGeometry(2.2, 0),
          new THREE.MeshLambertMaterial({ color: 0x888888 })
        );
        rock.position.set(pos.x, 1.5, pos.z); rock.castShadow = true; rock.receiveShadow = true;
        scene.add(rock);
        const crystal = new THREE.Mesh(
          new THREE.OctahedronGeometry(0.6),
          new THREE.MeshLambertMaterial({ color: [0xff6b6b,0x4d96ff,0xffd93d,0x6bcb77][Math.floor(Math.random()*4)], emissive: 0xffffff, emissiveIntensity: 0.2 })
        );
        crystal.position.set(pos.x, 3.5, pos.z); scene.add(crystal);
      });
      
      player = createCharacter(0x4488ff);
      for (let i = 0; i < 5; i++) spawnEnemy();
      
      document.getElementById('gameOver').style.display = 'none';
      document.getElementById('hpFill').style.width = '100%';
      document.getElementById('scoreDisplay').textContent = '🏆 0';
      
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        gameTime--;
        document.getElementById('timer').textContent = `${Math.floor(gameTime/60)}:${(gameTime%60).toString().padStart(2,'0')}`;
        if (gameTime <= 0) endGame(true);
      }, 1000);
      
      setupJoysticks();
      animate();
    }

    function createCharacter(color) {
      const g = new THREE.Group();
      const body = new THREE.Mesh(new THREE.CylinderGeometry(1, 1.3, 2.2, 12), new THREE.MeshLambertMaterial({ color, emissive: color, emissiveIntensity: 0.2 }));
      body.position.y = 1.5; body.castShadow = true; g.add(body);
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), new THREE.MeshLambertMaterial({ color: 0xffdbac }));
      head.position.y = 3.2; head.castShadow = true; g.add(head);
      const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.9, 16, 16, 0, Math.PI*2, 0, Math.PI/2), new THREE.MeshLambertMaterial({ color, emissive: color, emissiveIntensity: 0.3 }));
      helmet.position.y = 3.2; g.add(helmet);
      const eyeMat = new THREE.MeshLambertMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1 });
      const lEye = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), eyeMat);
      lEye.position.set(-0.25, 3.3, 0.7); g.add(lEye);
      const rEye = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), eyeMat);
      rEye.position.set(0.25, 3.3, 0.7); g.add(rEye);
      const gun = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8), new THREE.MeshLambertMaterial({ color: 0x333333 }));
      gun.position.set(0, 1.8, 1.2); gun.rotation.x = Math.PI/2; g.add(gun);
      scene.add(g);
      return g;
    }

    function spawnEnemy() {
      const colors = [0xff4444, 0xff8800, 0xff00ff, 0x00aaff];
      const color = colors[Math.floor(Math.random()*colors.length)];
      const enemy = createCharacter(color);
      enemy.position.set((Math.random()-0.5)*60, 0, (Math.random()-0.5)*60);
      enemies.push({ mesh: enemy, hp: 80, maxHp: 80, alive: true, respawnTimer: 0, shootCooldown: 0, speed: 0.04 + Math.random()*0.03 });
    }

    // ========== ДЖОЙСТИКИ (ОДНОВРЕМЕННАЯ РАБОТА) ==========
    function setupJoysticks() {
      // Синий — движение
      createJoystick('moveJoystick', 'moveBase', 'moveThumb', (a) => moveAngle = a);
      // Красный — атака
      createJoystick('attackJoystick', 'attackBase', 'attackThumb', (a) => attackAngle = a);
    }

    function createJoystick(containerId, baseId, thumbId, callback) {
      const container = document.getElementById(containerId);
      const base = document.getElementById(baseId);
      const thumb = document.getElementById(thumbId);
      let activeTouchId = null;
      
      container.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (activeTouchId === null) {
          const touch = e.changedTouches[0];
          activeTouchId = touch.identifier;
          container.classList.add('active');
          updateJoystick(touch, base, thumb, callback);
        }
      }, { passive: false });
      
      container.addEventListener('touchmove', (e) => {
        e.preventDefault();
        for (let touch of e.changedTouches) {
          if (touch.identifier === activeTouchId) {
            updateJoystick(touch, base, thumb, callback);
          }
        }
      }, { passive: false });
      
      container.addEventListener('touchend', (e) => {
        e.preventDefault();
        for (let touch of e.changedTouches) {
          if (touch.identifier === activeTouchId) {
            activeTouchId = null;
            container.classList.remove('active');
            thumb.style.transform = 'translate(-50%, -50%)';
            callback(null);
          }
        }
      });
      
      container.addEventListener('touchcancel', (e) => {
        activeTouchId = null;
        container.classList.remove('active');
        thumb.style.transform = 'translate(-50%, -50%)';
        callback(null);
      });
    }

    function updateJoystick(touch, base, thumb, callback) {
      const rect = base.getBoundingClientRect();
      const cx = rect.left + rect.width/2;
      const cy = rect.top + rect.height/2;
      const dx = touch.clientX - cx;
      const dy = touch.clientY - cy;
      const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 45);
      const angle = Math.atan2(dy, dx);
      thumb.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
      callback(dist > 8 ? angle : null);
    }

    // ========== АНИМАЦИЯ ==========
    let lastShot = 0;
    
    function animate() {
      if (!gameRunning) return;
      requestAnimationFrame(animate);
      
      if (moveAngle !== null && player) {
        player.position.x += Math.cos(moveAngle) * 0.18;
        player.position.z += Math.sin(moveAngle) * 0.18;
        player.position.x = Math.max(-42, Math.min(42, player.position.x));
        player.position.z = Math.max(-42, Math.min(42, player.position.z));
        player.rotation.y = -moveAngle + Math.PI/2;
      }
      
      camera.position.x += (player.position.x - camera.position.x) * 0.1;
      camera.position.z = player.position.z + 38;
      camera.lookAt(player.position.x, 0, player.position.z);
      
      const now = Date.now();
      if (attackAngle !== null && player && now - lastShot > 120) {
        lastShot = now;
        const bx = player.position.x + Math.cos(attackAngle) * 2;
        const bz = player.position.z + Math.sin(attackAngle) * 2;
        const bullet = new THREE.Mesh(
          new THREE.SphereGeometry(0.35, 8, 8),
          new THREE.MeshLambertMaterial({ color: 0xffd93d, emissive: 0xffd93d, emissiveIntensity: 0.8 })
        );
        bullet.position.set(bx, 2, bz);
        bullet.userData = { vx: Math.cos(attackAngle)*0.8, vz: Math.sin(attackAngle)*0.8, life: 100, fromPlayer: true };
        scene.add(bullet); bullets.push(bullet);
      }
      
      enemies.forEach(enemy => {
        if (!enemy.alive) {
          enemy.respawnTimer--;
          if (enemy.respawnTimer <= 0) {
            enemy.alive = true; enemy.hp = enemy.maxHp;
            enemy.mesh.visible = true;
            enemy.mesh.position.set((Math.random()-0.5)*70, 0, (Math.random()-0.5)*70);
          }
          return;
        }
        const dx = player.position.x - enemy.mesh.position.x;
        const dz = player.position.z - enemy.mesh.position.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if (dist > 6) { enemy.mesh.position.x += (dx/dist)*enemy.speed; enemy.mesh.position.z += (dz/dist)*enemy.speed; }
        enemy.mesh.lookAt(player.position.x, 0, player.position.z);
        if (dist < 30 && enemy.shootCooldown <= 0) {
          const angle = Math.atan2(dz, dx);
          const bullet = new THREE.Mesh(
            new THREE.SphereGeometry(0.25, 6, 6),
            new THREE.MeshLambertMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.6 })
          );
          bullet.position.copy(enemy.mesh.position); bullet.position.y = 2;
          bullet.userData = { vx: Math.cos(angle)*0.5, vz: Math.sin(angle)*0.5, life: 80, fromPlayer: false };
          scene.add(bullet); bullets.push(bullet);
          enemy.shootCooldown = 50 + Math.random()*30;
        }
        if (enemy.shootCooldown > 0) enemy.shootCooldown--;
      });
      
      for (let i = bullets.length-1; i >= 0; i--) {
        const b = bullets[i];
        b.position.x += b.userData.vx; b.position.z += b.userData.vz;
        b.userData.life--;
        if (b.userData.life <= 0 || Math.abs(b.position.x) > 50 || Math.abs(b.position.z) > 50) { scene.remove(b); bullets.splice(i,1); continue; }
        
        if (!b.userData.fromPlayer && playerHP > 0) {
          const d = player.position.distanceTo(b.position);
          if (d < 2.5) {
            playerHP -= 8;
            document.getElementById('hpFill').style.width = Math.max(0, playerHP/maxHP*100)+'%';
            scene.remove(b); bullets.splice(i,1);
            if (playerHP <= 0) endGame(false); continue;
          }
        }
        
        if (b.userData.fromPlayer) {
          for (let enemy of enemies) {
            if (!enemy.alive) continue;
            const d = enemy.mesh.position.distanceTo(b.position);
            if (d < 3) {
              enemy.hp -= 25; scene.remove(b); bullets.splice(i,1);
              if (enemy.hp <= 0) {
                enemy.alive = false; enemy.mesh.visible = false; enemy.respawnTimer = 90;
                score += 10;
                document.getElementById('scoreDisplay').textContent = '🏆 '+score;
                if (enemies.filter(e=>e.alive).length < 3) spawnEnemy();
              }
              break;
            }
          }
        }
      }
      
      scene.children.forEach(child => {
        if (child.geometry?.type === 'OctahedronGeometry') child.rotation.y += 0.02;
      });
      
      renderer.render(scene, camera);
    }

    function endGame(won) {
      gameRunning = false; clearInterval(timerInterval);
      document.getElementById('gameOver').style.display = 'flex';
      document.getElementById('gameOverScore').textContent = '🏆 '+score;
      document.getElementById('gameOverTitle').textContent = won ? 'Победа!' : 'Поражение';
    }

    window.restartGame = () => {
      clearInterval(timerInterval);
      while(scene.children.length > 0) scene.remove(scene.children[0]);
      enemies = []; bullets = [];
      document.getElementById('gameOver').style.display = 'none';
      initGame();
    };

    window.addEventListener('resize', () => {
      if (renderer && gameRunning) {
        W = window.innerWidth; H = window.innerHeight;
        renderer.setSize(W, H); camera.aspect = W/H; camera.updateProjectionMatrix();
      }
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
