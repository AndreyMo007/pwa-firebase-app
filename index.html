<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Brawl Arena - Мобильная арена">
  <title>Brawl Arena</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #000; 
      overflow: hidden; 
      touch-action: none; 
      user-select: none; 
      -webkit-user-select: none;
      font-family: 'Arial', sans-serif;
      height: 100vh;
      width: 100vw;
    }
    
    /* САЙТ - ПРИВЕТСТВИЕ */
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      background: linear-gradient(135deg, #1a0033, #0a0a2e);
      color: white;
      padding: 20px;
    }
    .welcome-screen .logo { font-size: 100px; animation: bounce 1.5s infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-30px)} }
    .welcome-screen h1 { 
      font-size: 3rem; 
      background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin: 20px 0;
    }
    .welcome-screen p { opacity: 0.8; margin-bottom: 30px; font-size: 1.2rem; }
    .install-btn {
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      color: white; padding: 18px 50px; border-radius: 50px;
      font-size: 1.3rem; font-weight: 700; cursor: pointer; border: none;
      box-shadow: 0 10px 30px rgba(255,107,107,0.4);
      animation: pulse 2s infinite; margin-bottom: 15px;
    }
    @keyframes pulse { 0%,100%{box-shadow:0 10px 30px rgba(255,107,107,0.4)} 50%{box-shadow:0 10px 50px rgba(255,107,107,0.8)} }
    .install-btn:active { transform: scale(0.95); }
    .open-btn { background: transparent; color: #ffd93d; padding: 14px 30px; border-radius: 50px; font-size: 1rem; cursor: pointer; border: 2px solid #ffd93d; margin-top: 10px; }
    
    /* ИГРА */
    .game-container {
      display: none;
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #2d5016;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
    }
    .ui-top {
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      pointer-events: none;
    }
    .health-bar {
      width: 150px;
      height: 15px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid white;
    }
    .health-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6b6b, #ff4444);
      transition: width 0.3s;
      border-radius: 10px;
    }
    .score-display {
      color: #ffd93d;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255,217,61,0.5);
    }
    .timer {
      color: white;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.5);
      padding: 5px 15px;
      border-radius: 20px;
    }
    .joystick-area {
      position: absolute;
      bottom: 40px;
      left: 40px;
      width: 140px;
      height: 140px;
      z-index: 20;
    }
    .joystick-base {
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      position: relative;
    }
    .joystick-thumb {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid white;
    }
    .game-over {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      text-align: center;
    }
    .game-over h2 { font-size: 3rem; margin-bottom: 10px; }
    .game-over .score { font-size: 2rem; color: #ffd93d; margin-bottom: 20px; }
    .game-over button {
      background: linear-gradient(135deg, #6bcb77, #4d96ff);
      color: white; padding: 15px 40px; border-radius: 50px;
      font-size: 1.2rem; cursor: pointer; border: none; font-weight: 700;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- САЙТ - ПРИВЕТСТВИЕ -->
  <div id="welcomeScreen" class="welcome-screen">
    <div class="logo">⚔️</div>
    <h1>Brawl Arena</h1>
    <p>Мобильная арена с джойстиком</p>
    <button id="installBtn" class="install-btn hidden" onclick="installApp()">📲 Установить игру</button>
    <button id="openBtn" class="open-btn hidden" onclick="startGame()">🎮 Играть в браузере</button>
    <p style="margin-top:15px;opacity:0.5;">Установите приложение для лучшего опыта</p>
  </div>

  <!-- ИГРА -->
  <div id="gameContainer" class="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-top">
      <div class="health-bar"><div class="health-fill" id="healthFill" style="width:100%"></div></div>
      <div class="timer" id="timer">2:00</div>
      <div class="score-display" id="scoreDisplay">🏆 0</div>
    </div>
    
    <div class="joystick-area" id="joystickArea">
      <div class="joystick-base" id="joystickBase">
        <div class="joystick-thumb" id="joystickThumb"></div>
      </div>
    </div>
    
    <div class="game-over" id="gameOver">
      <h2 id="gameOverTitle">Победа!</h2>
      <div class="score" id="gameOverScore">🏆 0</div>
      <button onclick="restartGame()">Играть снова</button>
    </div>
  </div>

  <script>
    // ========== PWA ОПРЕДЕЛЕНИЕ ==========
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').classList.remove('hidden');
    });

    window.installApp = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        document.getElementById('installBtn').classList.add('hidden');
      }
      deferredPrompt = null;
    };

    window.addEventListener('appinstalled', () => {
      document.getElementById('installBtn').classList.add('hidden');
      document.getElementById('openBtn').classList.remove('hidden');
    });

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    if (isStandalone) {
      // В приложении — сразу игра
      document.getElementById('welcomeScreen').classList.add('hidden');
      document.getElementById('gameContainer').style.display = 'block';
      initGame();
    } else {
      // На сайте — кнопки
      document.getElementById('welcomeScreen').style.display = 'flex';
      document.getElementById('openBtn').classList.remove('hidden');
    }

    window.startGame = () => {
      document.getElementById('welcomeScreen').classList.add('hidden');
      document.getElementById('gameContainer').style.display = 'block';
      initGame();
    };

    // ========== ИГРА ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let W, H;
    let player, enemies, bullets;
    let score = 0;
    let gameRunning = false;
    let gameTime = 120; // 2 минуты
    let timerInterval;
    
    // Джойстик
    let joystickActive = false;
    let joystickX = 0, joystickY = 0;
    let moveX = 0, moveY = 0;

    // Персонаж
    class Character {
      constructor(x, y, color, hp, speed, isPlayer = false) {
        this.x = x; this.y = y;
        this.color = color;
        this.hp = hp; this.maxHp = hp;
        this.speed = speed;
        this.radius = 20;
        this.isPlayer = isPlayer;
        this.shootCooldown = 0;
        this.respawnTimer = 0;
        this.alive = true;
      }
      
      draw() {
        if (!this.alive) return;
        // Тень
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.arc(this.x, this.y + 3, this.radius, 0, Math.PI * 2);
        ctx.fill();
        
        // Тело
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Глаза
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(this.x - 6, this.y - 6, 5, 0, Math.PI * 2);
        ctx.arc(this.x + 6, this.y - 6, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(this.x - 6, this.y - 6, 2.5, 0, Math.PI * 2);
        ctx.arc(this.x + 6, this.y - 6, 2.5, 0, Math.PI * 2);
        ctx.fill();
        
        // HP бар
        if (this.hp < this.maxHp) {
          const bw = this.radius * 2;
          ctx.fillStyle = 'red';
          ctx.fillRect(this.x - this.radius, this.y - this.radius - 12, bw, 5);
          ctx.fillStyle = '#00ff00';
          ctx.fillRect(this.x - this.radius, this.y - this.radius - 12, bw * (this.hp / this.maxHp), 5);
        }
        
        // Игрок — оружие
        if (this.isPlayer) {
          const angle = Math.atan2(moveY, moveX) || -Math.PI/2;
          ctx.strokeStyle = '#666';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(this.x, this.y);
          ctx.lineTo(this.x + Math.cos(angle) * 30, this.y + Math.sin(angle) * 30);
          ctx.stroke();
        }
      }
      
      move(dx, dy) {
        if (!this.alive) return;
        const newX = this.x + dx * this.speed;
        const newY = this.y + dy * this.speed;
        if (newX > this.radius && newX < W - this.radius) this.x = newX;
        if (newY > this.radius && newY < H - this.radius) this.y = newY;
      }
      
      shoot(target) {
        if (!this.alive || this.shootCooldown > 0) return;
        const angle = Math.atan2(target.y - this.y, target.x - this.x);
        bullets.push({
          x: this.x, y: this.y,
          vx: Math.cos(angle) * 8,
          vy: Math.sin(angle) * 8,
          fromPlayer: this.isPlayer,
          damage: this.isPlayer ? 15 : 10
        });
        this.shootCooldown = this.isPlayer ? 15 : 40;
      }
      
      update() {
        if (!this.alive) {
          this.respawnTimer--;
          if (this.respawnTimer <= 0) {
            this.alive = true;
            this.hp = this.maxHp;
            this.x = Math.random() * (W - 100) + 50;
            this.y = Math.random() * (H - 200) + 50;
          }
          return;
        }
        if (this.shootCooldown > 0) this.shootCooldown--;
      }
    }

    function spawnEnemy() {
      const x = Math.random() * (W - 100) + 50;
      const y = Math.random() * (H - 200) + 50;
      const colors = ['#ff4444', '#ff8800', '#ff00ff', '#00aaff'];
      const color = colors[Math.floor(Math.random() * colors.length)];
      enemies.push(new Character(x, y, color, 80, 1.8));
    }

    function initGame() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
      
      player = new Character(W/2, H/2, '#4d96ff', 120, 2.5, true);
      enemies = [];
      bullets = [];
      score = 0;
      gameTime = 120;
      gameRunning = true;
      
      document.getElementById('gameOver').style.display = 'none';
      document.getElementById('healthFill').style.width = '100%';
      document.getElementById('scoreDisplay').textContent = '🏆 0';
      document.getElementById('timer').textContent = '2:00';
      
      for (let i = 0; i < 3; i++) spawnEnemy();
      
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        gameTime--;
        const min = Math.floor(gameTime / 60);
        const sec = gameTime % 60;
        document.getElementById('timer').textContent = `${min}:${sec.toString().padStart(2,'0')}`;
        if (gameTime <= 0) endGame();
      }, 1000);
      
      gameLoop();
    }

    function endGame() {
      gameRunning = false;
      clearInterval(timerInterval);
      document.getElementById('gameOver').style.display = 'flex';
      document.getElementById('gameOverScore').textContent = '🏆 ' + score;
      document.getElementById('gameOverTitle').textContent = score >= 50 ? 'Победа!' : 'Поражение';
    }

    window.restartGame = () => {
      if (timerInterval) clearInterval(timerInterval);
      enemies = [];
      bullets = [];
      initGame();
    };

    // ========== ДЖОЙСТИК ==========
    const joystickArea = document.getElementById('joystickArea');
    const joystickBase = document.getElementById('joystickBase');
    const joystickThumb = document.getElementById('joystickThumb');
    
    joystickArea.addEventListener('touchstart', (e) => {
      e.preventDefault();
      joystickActive = true;
      handleJoystick(e.touches[0]);
    });
    
    joystickArea.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (joystickActive) handleJoystick(e.touches[0]);
    });
    
    joystickArea.addEventListener('touchend', (e) => {
      e.preventDefault();
      joystickActive = false;
      moveX = 0; moveY = 0;
      joystickThumb.style.transform = 'translate(-50%, -50%)';
    });
    
    function handleJoystick(touch) {
      const rect = joystickBase.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = touch.clientX - cx;
      const dy = touch.clientY - cy;
      const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
      const angle = Math.atan2(dy, dx);
      moveX = Math.cos(angle) * (dist / 50);
      moveY = Math.sin(angle) * (dist / 50);
      joystickThumb.style.transform = `translate(calc(-50% + ${moveX * 50}px), calc(-50% + ${moveY * 50}px))`;
    }

    // ========== ИГРОВОЙ ЦИКЛ ==========
    function gameLoop() {
      if (!gameRunning) return;
      
      ctx.clearRect(0, 0, W, H);
      
      // Фон с сеткой
      ctx.fillStyle = '#2d5016';
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 60) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += 60) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
      
      // Границы
      ctx.strokeStyle = '#ffd93d';
      ctx.lineWidth = 4;
      ctx.strokeRect(2, 2, W - 4, H - 4);
      
      // Игрок
      player.move(moveX, moveY);
      player.update();
      player.draw();
      
      // Враги
      enemies.forEach(enemy => {
        enemy.update();
        enemy.draw();
        
        if (enemy.alive && player.alive) {
          // Идти к игроку
          const dx = player.x - enemy.x;
          const dy = player.y - enemy.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist > 0) {
            enemy.move(dx / dist, dy / dist);
          }
          // Стрелять
          if (dist < 300) {
            enemy.shoot(player);
          }
        }
      });
      
      // Пули
      bullets = bullets.filter(b => {
        b.x += b.vx;
        b.y += b.vy;
        
        ctx.fillStyle = b.fromPlayer ? '#ffd93d' : '#ff4444';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
        ctx.fill();
        
        // Выход за границы
        if (b.x < 0 || b.x > W || b.y < 0 || b.y > H) return false;
        
        // Попадание
        if (b.fromPlayer) {
          for (let enemy of enemies) {
            if (!enemy.alive) continue;
            const d = Math.sqrt((b.x-enemy.x)**2 + (b.y-enemy.y)**2);
            if (d < enemy.radius) {
              enemy.hp -= b.damage;
              if (enemy.hp <= 0) {
                enemy.alive = false;
                enemy.respawnTimer = 60;
                score += 10;
                document.getElementById('scoreDisplay').textContent = '🏆 ' + score;
              }
              return false;
            }
          }
        } else if (player.alive) {
          const d = Math.sqrt((b.x-player.x)**2 + (b.y-player.y)**2);
          if (d < player.radius) {
            player.hp -= b.damage;
            document.getElementById('healthFill').style.width = (player.hp / player.maxHp * 100) + '%';
            if (player.hp <= 0) {
              player.alive = false;
              player.respawnTimer = 60;
            }
            return false;
          }
        }
        return true;
      });
      
      // Спаун врагов
      const aliveEnemies = enemies.filter(e => e.alive).length;
      if (aliveEnemies < 3 && enemies.length < 5) spawnEnemy();
      
      requestAnimationFrame(gameLoop);
    }

    // Регистрация Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
