<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="3D Brawl Arena">
  <meta name="screen-orientation" content="landscape">
  <title>3D Brawl Arena</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #000; overflow: hidden; touch-action: none; 
      user-select: none; -webkit-user-select: none; 
      height: 100vh; width: 100vw; font-family: 'Arial', sans-serif;
      position: fixed; top: 0; left: 0;
    }
    
    .welcome-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; width: 100vw; text-align: center;
      background: linear-gradient(135deg, #1a0033 0%, #0a0a2e 50%, #001a33 100%);
      color: white; padding: 20px; position: fixed; top: 0; left: 0; z-index: 999;
    }
    .welcome-screen .logo { font-size: 80px; animation: bounce 1.5s infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-25px)} }
    .welcome-screen h1 { font-size: 2.5rem; background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 15px 0; }
    .welcome-screen p { opacity: 0.8; margin-bottom: 20px; font-size: 1rem; }
    .install-btn { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: white; padding: 15px 40px; border-radius: 50px; font-size: 1.1rem; font-weight: 700; cursor: pointer; border: none; box-shadow: 0 10px 30px rgba(255,107,107,0.4); animation: pulse 2s infinite; margin-bottom: 10px; }
    @keyframes pulse { 0%,100%{box-shadow:0 8px 25px rgba(255,107,107,0.4)} 50%{box-shadow:0 8px 45px rgba(255,107,107,0.8)} }
    .open-btn { background: transparent; color: #ffd93d; padding: 12px 25px; border-radius: 50px; font-size: 0.9rem; cursor: pointer; border: 2px solid #ffd93d; }
    
    #gameContainer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
    canvas { display: block; width: 100%; height: 100%; }
    
    .ui-top {
      position: absolute; top: 10px; left: 15px; right: 15px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 10; pointer-events: none;
    }
    .hp-bar { width: 140px; height: 14px; background: rgba(0,0,0,0.6); border-radius: 10px; overflow: hidden; border: 2px solid rgba(255,255,255,0.5); }
    .hp-fill { height: 100%; background: linear-gradient(90deg, #ff4444, #ff8800, #00ff00); transition: width 0.3s; }
    .score-display { color: #ffd93d; font-size: 16px; font-weight: bold; text-shadow: 0 0 10px rgba(255,217,61,0.5); }
    .timer { color: white; font-size: 18px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 12px; }
    
    .joystick {
      position: absolute; bottom: 30px; width: 110px; height: 110px; z-index: 20;
    }
    #moveJoystick { left: 25px; }
    #attackJoystick { right: 25px; }
    .joystick-base {
      width: 100%; height: 100%; background: rgba(255,255,255,0.08);
      border-radius: 50%; border: 2px solid rgba(255,255,255,0.15); position: relative;
      backdrop-filter: blur(5px);
    }
    .joystick-thumb {
      width: 45px; height: 45px; background: rgba(255,255,255,0.35);
      border-radius: 50%; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); border: 2px solid rgba(255,255,255,0.6);
      pointer-events: none; box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }
    .joystick-label {
      position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-size: 10px; font-weight: bold;
      text-transform: uppercase; letter-spacing: 2px;
    }
    
    .game-over {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 100;
      flex-direction: column; align-items: center; justify-content: center;
      color: white; text-align: center;
    }
    .game-over h2 { font-size: 3rem; background: linear-gradient(45deg, #ff6b6b, #ffd93d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .game-over .final-score { font-size: 2rem; color: #ffd93d; margin-bottom: 20px; }
    .game-over button { background: linear-gradient(135deg, #6bcb77, #4d96ff); color: white; padding: 15px 40px; border-radius: 50px; font-size: 1.2rem; cursor: pointer; border: none; font-weight: 700; }
    
    .hidden { display: none !important; }
    
    @media (orientation: portrait) {
      .welcome-screen h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <!-- ПРИВЕТСТВИЕ -->
  <div id="welcomeScreen" class="welcome-screen">
    <div class="logo">⚔️</div>
    <h1>3D Brawl Arena</h1>
    <p>Горизонтальный режим • Два джойстика</p>
    <button id="installBtn" class="install-btn hidden" onclick="installApp()">📲 Установить игру</button>
    <button id="openBtn" class="open-btn hidden" onclick="startGame()">🎮 Играть в браузере</button>
    <p style="margin-top:12px;opacity:0.4;font-size:0.8rem;">Поверните телефон горизонтально</p>
  </div>

  <!-- ИГРА -->
  <div id="gameContainer">
    <div class="ui-top">
      <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width:100%"></div></div>
      <div class="timer" id="timer">2:00</div>
      <div class="score-display" id="scoreDisplay">🏆 0</div>
    </div>
    
    <div class="joystick" id="moveJoystick">
      <div class="joystick-label">Движение</div>
      <div class="joystick-base" id="moveBase">
        <div class="joystick-thumb" id="moveThumb"></div>
      </div>
    </div>
    
    <div class="joystick" id="attackJoystick">
      <div class="joystick-label">Атака</div>
      <div class="joystick-base" id="attackBase">
        <div class="joystick-thumb" id="attackThumb"></div>
      </div>
    </div>
    
    <div class="game-over" id="gameOver">
      <h2 id="gameOverTitle">Победа!</h2>
      <div class="final-score" id="gameOverScore">🏆 0</div>
      <button onclick="restartGame()">Играть снова</button>
    </div>
  </div>

  <script>
    // ========== PWA ==========
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); deferredPrompt = e;
      document.getElementById('installBtn').classList.remove('hidden');
    });
    
    window.installApp = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') document.getElementById('installBtn').classList.add('hidden');
      deferredPrompt = null;
    };
    
    window.addEventListener('appinstalled', () => {
      document.getElementById('installBtn').classList.add('hidden');
      document.getElementById('openBtn').classList.remove('hidden');
    });

    // Запуск
    function bootGame() {
      document.getElementById('welcomeScreen').classList.add('hidden');
      document.getElementById('gameContainer').style.display = 'block';
      // Запрос полноэкранного режима
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else if (document.documentElement.webkitRequestFullscreen) {
        document.documentElement.webkitRequestFullscreen();
      }
      // Блокировка ориентации
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }
      initGame();
    }

    if (isStandalone) {
      bootGame();
    } else {
      document.getElementById('welcomeScreen').style.display = 'flex';
      document.getElementById('openBtn').classList.remove('hidden');
    }

    window.startGame = bootGame;

    // ========== 3D ИГРА ==========
    let scene, camera, renderer;
    let player, playerBody, enemies = [], bullets = [];
    let moveAngle = null, attackAngle = null;
    let score = 0, gameTime = 120, gameRunning = false, timerInterval;
    let playerHP = 120, maxHP = 120;
    let W, H;

    function initGame() {
      W = window.innerWidth;
      H = window.innerHeight;
      
      // Очистка предыдущей игры
      if (renderer) {
        renderer.dispose();
        document.querySelectorAll('canvas').forEach(c => c.remove());
      }
      enemies = [];
      bullets = [];
      score = 0;
      gameTime = 120;
      gameRunning = true;
      playerHP = maxHP;
      
      scene = new THREE.Scene();
      
      // Красивый градиентный фон
      const bgCanvas = document.createElement('canvas');
      bgCanvas.width = 512; bgCanvas.height = 512;
      const bgCtx = bgCanvas.getContext('2d');
      const gradient = bgCtx.createLinearGradient(0, 0, 0, 512);
      gradient.addColorStop(0, '#87CEEB');
      gradient.addColorStop(0.4, '#98FB98');
      gradient.addColorStop(0.6, '#228B22');
      gradient.addColorStop(1, '#1a5c1a');
      bgCtx.fillStyle = gradient;
      bgCtx.fillRect(0, 0, 512, 512);
      const bgTexture = new THREE.CanvasTexture(bgCanvas);
      scene.background = bgTexture;
      scene.fog = new THREE.Fog(0x87CEEB, 40, 100);
      
      camera = new THREE.PerspectiveCamera(55, W / H, 1, 500);
      camera.position.set(0, 50, 40);
      camera.lookAt(0, 0, 0);
      
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.getElementById('gameContainer').appendChild(renderer.domElement);
      
      // Солнечный свет
      const sun = new THREE.DirectionalLight(0xfff5e6, 1.2);
      sun.position.set(30, 40, 20);
      sun.castShadow = true;
      sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
      sun.shadow.camera.top = 60; sun.shadow.camera.bottom = -60;
      sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
      sun.shadow.bias = -0.001;
      scene.add(sun);
      
      scene.add(new THREE.AmbientLight(0x6688aa, 0.6));
      scene.add(new THREE.HemisphereLight(0x87CEEB, 0x228B22, 0.4));
      
      // Земля с текстурой
      const groundGeo = new THREE.PlaneGeometry(100, 100);
      const groundCanvas = document.createElement('canvas');
      groundCanvas.width = 256; groundCanvas.height = 256;
      const gctx = groundCanvas.getContext('2d');
      gctx.fillStyle = '#4CAF50';
      gctx.fillRect(0, 0, 256, 256);
      for (let i = 0; i < 200; i++) {
        gctx.fillStyle = `rgba(${50+Math.random()*50},${150+Math.random()*100},${30+Math.random()*50},0.3)`;
        gctx.fillRect(Math.random()*256, Math.random()*256, 4, 4);
      }
      const groundTex = new THREE.CanvasTexture(groundCanvas);
      groundTex.wrapS = THREE.RepeatWrapping;
      groundTex.wrapT = THREE.RepeatWrapping;
      groundTex.repeat.set(5, 5);
      const ground = new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({ map: groundTex }));
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);
      
      // Препятствия
      const obstaclePositions = [
        {x:-18,z:-18},{x:18,z:18},{x:-18,z:18},{x:18,z:-18},
        {x:0,z:-25},{x:0,z:25},{x:-25,z:0},{x:25,z:0},
        {x:-12,z:-12},{x:12,z:12},{x:-12,z:12},{x:12,z:-12}
      ];
      
      obstaclePositions.forEach(pos => {
        const group = new THREE.Group();
        
        // Камень
        const rockGeo = new THREE.DodecahedronGeometry(2 + Math.random(), 0);
        const rock = new THREE.Mesh(rockGeo, new THREE.MeshLambertMaterial({ color: 0x888888 }));
        rock.position.y = 1.5;
        rock.castShadow = true;
        rock.receiveShadow = true;
        group.add(rock);
        
        // Кристалл сверху
        const crystalGeo = new THREE.OctahedronGeometry(0.6);
        const crystalColors = [0xff6b6b, 0x4d96ff, 0xffd93d, 0x6bcb77];
        const crystal = new THREE.Mesh(crystalGeo, new THREE.MeshLambertMaterial({ 
          color: crystalColors[Math.floor(Math.random()*4)],
          emissive: crystalColors[Math.floor(Math.random()*4)],
          emissiveIntensity: 0.3
        }));
        crystal.position.y = 3.5;
        crystal.castShadow = true;
        group.add(crystal);
        
        group.position.set(pos.x, 0, pos.z);
        scene.add(group);
      });
      
      // Бордюры арены
      for (let i = -45; i <= 45; i += 2) {
        [-45, 45].forEach(edge => {
          const fenceGeo = new THREE.BoxGeometry(1, 3, 1);
          const fence = new THREE.Mesh(fenceGeo, new THREE.MeshLambertMaterial({ color: 0xffffff }));
          fence.position.set(i, 1.5, edge);
          fence.castShadow = true;
          scene.add(fence);
          fence.position.set(edge, 1.5, i);
          scene.add(fence.clone());
        });
      }
      
      // Игрок
      player = createPlayerCharacter(0x4488ff);
      
      // Враги
      for (let i = 0; i < 5; i++) {
        spawnEnemy();
      }
      
      document.getElementById('gameOver').style.display = 'none';
      document.getElementById('hpFill').style.width = '100%';
      document.getElementById('scoreDisplay').textContent = '🏆 0';
      
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        gameTime--;
        document.getElementById('timer').textContent = `${Math.floor(gameTime/60)}:${(gameTime%60).toString().padStart(2,'0')}`;
        if (gameTime <= 0) endGame(true);
      }, 1000);
      
      setupJoysticks();
      animate();
    }

    function createPlayerCharacter(color) {
      const group = new THREE.Group();
      
      // Тело (робот-стиль)
      const bodyGeo = new THREE.CylinderGeometry(1, 1.3, 2.2, 12);
      const bodyMat = new THREE.MeshLambertMaterial({ color, emissive: color, emissiveIntensity: 0.2 });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 1.5;
      body.castShadow = true;
      group.add(body);
      
      // Броня
      const armorGeo = new THREE.TorusGeometry(1.1, 0.15, 8, 12);
      const armor = new THREE.Mesh(armorGeo, new THREE.MeshLambertMaterial({ color: 0xffffff }));
      armor.position.y = 2;
      armor.rotation.x = Math.PI/2;
      group.add(armor);
      
      // Голова
      const headGeo = new THREE.SphereGeometry(0.8, 16, 16);
      const head = new THREE.Mesh(headGeo, new THREE.MeshLambertMaterial({ color: 0xffdbac }));
      head.position.y = 3.2;
      head.castShadow = true;
      group.add(head);
      
      // Шлем
      const helmetGeo = new THREE.SphereGeometry(0.9, 16, 16, 0, Math.PI*2, 0, Math.PI/2);
      const helmet = new THREE.Mesh(helmetGeo, new THREE.MeshLambertMaterial({ color, emissive: color, emissiveIntensity: 0.3 }));
      helmet.position.y = 3.2;
      group.add(helmet);
      
      // Глаза (светящиеся)
      const eyeGeo = new THREE.SphereGeometry(0.2, 8, 8);
      const eyeMat = new THREE.MeshLambertMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1 });
      const lEye = new THREE.Mesh(eyeGeo, eyeMat);
      lEye.position.set(-0.25, 3.3, 0.7);
      group.add(lEye);
      const rEye = new THREE.Mesh(eyeGeo, eyeMat);
      rEye.position.set(0.25, 3.3, 0.7);
      group.add(rEye);
      
      // Пушка
      const gunGeo = new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8);
      const gun = new THREE.Mesh(gunGeo, new THREE.MeshLambertMaterial({ color: 0x333333 }));
      gun.position.set(0, 1.8, 1.2);
      gun.rotation.x = Math.PI/2;
      gun.castShadow = true;
      group.add(gun);
      
      playerBody = group;
      scene.add(group);
      return group;
    }

    function spawnEnemy() {
      const colors = [0xff4444, 0xff8800, 0xff00ff, 0x00aaff, 0xff0066];
      const color = colors[Math.floor(Math.random()*colors.length)];
      const ex = (Math.random() - 0.5) * 60;
      const ez = (Math.random() - 0.5) * 60;
      
      const enemy = createPlayerCharacter(color);
      enemy.position.set(ex, 0, ez);
      
      enemies.push({
        mesh: enemy,
        hp: 80,
        maxHp: 80,
        alive: true,
        respawnTimer: 0,
        shootCooldown: 0,
        speed: 0.04 + Math.random() * 0.03
      });
    }

    // ========== ДЖОЙСТИКИ ==========
    function setupJoysticks() {
      createJoystick('moveBase', 'moveThumb', (a) => moveAngle = a);
      createJoystick('attackBase', 'attackThumb', (a) => attackAngle = a);
    }

    function createJoystick(baseId, thumbId, callback) {
      const base = document.getElementById(baseId);
      const thumb = document.getElementById(thumbId);
      let active = false;
      
      const handlers = {
        start: (e) => { e.preventDefault(); active = true; update(e.touches ? e.touches[0] : e); },
        move: (e) => { e.preventDefault(); if (active) update(e.touches ? e.touches[0] : e); },
        end: (e) => { e.preventDefault(); active = false; thumb.style.transform = 'translate(-50%, -50%)'; callback(null); }
      };
      
      base.addEventListener('touchstart', handlers.start, {passive: false});
      base.addEventListener('touchmove', handlers.move, {passive: false});
      base.addEventListener('touchend', handlers.end);
      
      function update(touch) {
        const rect = base.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        const dx = touch.clientX - cx;
        const dy = touch.clientY - cy;
        const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 45);
        const angle = Math.atan2(dy, dx);
        thumb.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
        callback(dist > 8 ? angle : null);
      }
    }

    // ========== АНИМАЦИЯ ==========
    let lastShot = 0;
    
    function animate() {
      if (!gameRunning) return;
      requestAnimationFrame(animate);
      
      // Движение игрока
      if (moveAngle !== null && player) {
        player.position.x += Math.cos(moveAngle) * 0.18;
        player.position.z += Math.sin(moveAngle) * 0.18;
        player.position.x = Math.max(-42, Math.min(42, player.position.x));
        player.position.z = Math.max(-42, Math.min(42, player.position.z));
        player.rotation.y = -moveAngle + Math.PI/2;
      }
      
      // Камера
      camera.position.x += (player.position.x - camera.position.x) * 0.1;
      camera.position.z = player.position.z + 38;
      camera.lookAt(player.position.x, 0, player.position.z);
      
      // Стрельба
      const now = Date.now();
      if (attackAngle !== null && player && now - lastShot > 120) {
        lastShot = now;
        const bx = player.position.x + Math.cos(attackAngle) * 2;
        const bz = player.position.z + Math.sin(attackAngle) * 2;
        
        const bulletGeo = new THREE.SphereGeometry(0.35, 8, 8);
        const bulletMat = new THREE.MeshLambertMaterial({ 
          color: 0xffd93d, emissive: 0xffd93d, emissiveIntensity: 0.8 
        });
        const bullet = new THREE.Mesh(bulletGeo, bulletMat);
        bullet.position.set(bx, 2, bz);
        bullet.userData = {
          vx: Math.cos(attackAngle) * 0.8,
          vz: Math.sin(attackAngle) * 0.8,
          life: 100,
          fromPlayer: true
        };
        scene.add(bullet);
        bullets.push(bullet);
      }
      
      // Враги
      enemies.forEach(enemy => {
        if (!enemy.alive) {
          enemy.respawnTimer--;
          if (enemy.respawnTimer <= 0) {
            enemy.alive = true;
            enemy.hp = enemy.maxHp;
            enemy.mesh.visible = true;
            enemy.mesh.position.set((Math.random()-0.5)*70, 0, (Math.random()-0.5)*70);
          }
          return;
        }
        
        const dx = player.position.x - enemy.mesh.position.x;
        const dz = player.position.z - enemy.mesh.position.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        
        if (dist > 6) {
          enemy.mesh.position.x += (dx/dist) * enemy.speed;
          enemy.mesh.position.z += (dz/dist) * enemy.speed;
        }
        
        enemy.mesh.lookAt(player.position.x, 0, player.position.z);
        
        if (dist < 30 && enemy.shootCooldown <= 0) {
          const angle = Math.atan2(dz, dx);
          const bulletGeo = new THREE.SphereGeometry(0.25, 6, 6);
          const bulletMat = new THREE.MeshLambertMaterial({ 
            color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.6 
          });
          const bullet = new THREE.Mesh(bulletGeo, bulletMat);
          bullet.position.copy(enemy.mesh.position);
          bullet.position.y = 2;
          bullet.userData = { vx: Math.cos(angle)*0.5, vz: Math.sin(angle)*0.5, life: 80, fromPlayer: false };
          scene.add(bullet);
          bullets.push(bullet);
          enemy.shootCooldown = 50 + Math.random() * 30;
        }
        if (enemy.shootCooldown > 0) enemy.shootCooldown--;
      });
      
      // Пули
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.position.x += b.userData.vx;
        b.position.z += b.userData.vz;
        b.userData.life--;
        
        if (b.userData.life <= 0 || Math.abs(b.position.x) > 50 || Math.abs(b.position.z) > 50) {
          scene.remove(b); bullets.splice(i, 1); continue;
        }
        
        // Попадание в игрока
        if (!b.userData.fromPlayer && playerHP > 0) {
          const d = player.position.distanceTo(b.position);
          if (d < 2.5) {
            playerHP -= 8;
            document.getElementById('hpFill').style.width = Math.max(0, playerHP/maxHP*100) + '%';
            scene.remove(b); bullets.splice(i, 1);
            if (playerHP <= 0) endGame(false);
            continue;
          }
        }
        
        // Попадание во врагов
        if (b.userData.fromPlayer) {
          for (let enemy of enemies) {
            if (!enemy.alive) continue;
            const d = enemy.mesh.position.distanceTo(b.position);
            if (d < 3) {
              enemy.hp -= 25;
              scene.remove(b); bullets.splice(i, 1);
              if (enemy.hp <= 0) {
                enemy.alive = false;
                enemy.mesh.visible = false;
                enemy.respawnTimer = 90;
                score += 10;
                document.getElementById('scoreDisplay').textContent = '🏆 ' + score;
                if (enemies.filter(e => e.alive).length < 3) spawnEnemy();
              }
              break;
            }
          }
        }
      }
      
      // Вращение кристаллов
      scene.children.forEach(child => {
        if (child.children && child.children.length > 1) {
          const crystal = child.children[1];
          if (crystal && crystal.geometry?.type === 'OctahedronGeometry') {
            crystal.rotation.y += 0.02;
          }
        }
      });
      
      renderer.render(scene, camera);
    }

    function endGame(won) {
      gameRunning = false;
      clearInterval(timerInterval);
      document.getElementById('gameOver').style.display = 'flex';
      document.getElementById('gameOverScore').textContent = '🏆 ' + score;
      document.getElementById('gameOverTitle').textContent = won ? 'Победа!' : 'Поражение';
      document.getElementById('gameOverTitle').style.background = won ? 
        'linear-gradient(45deg, #6bcb77, #ffd93d)' : 
        'linear-gradient(45deg, #ff6b6b, #ff0000)';
      document.getElementById('gameOverTitle').style.webkitBackgroundClip = 'text';
      document.getElementById('gameOverTitle').style.webkitTextFillColor = 'transparent';
    }

    window.restartGame = () => {
      clearInterval(timerInterval);
      while(scene.children.length > 0) scene.remove(scene.children[0]);
      enemies = []; bullets = [];
      document.getElementById('gameOver').style.display = 'none';
      initGame();
    };

    // Обработка изменения размера
    window.addEventListener('resize', () => {
      if (renderer && gameRunning) {
        W = window.innerWidth; H = window.innerHeight;
        renderer.setSize(W, H);
        camera.aspect = W / H;
        camera.updateProjectionMatrix();
      }
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        reg.update();
      }).catch(() => {});
    }
  </script>
</body>
</html>
