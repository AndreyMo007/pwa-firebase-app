<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="3D Brawl Arena">
  <meta name="screen-orientation" content="landscape">
  <title>3D Brawl Arena</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      font-family: 'Arial', sans-serif;
      background: #000;
      position: fixed;
      top: 0;
      left: 0;
    }
    
    /* Принудительная ландшафтная ориентация через CSS */
    @media screen and (orientation: portrait) {
      html {
        transform: rotate(90deg);
        transform-origin: center center;
        width: 100vh;
        height: 100vw;
        position: absolute;
        top: 50%;
        left: 50%;
        margin-left: -50vh;
        margin-top: -50vw;
      }
    }
    
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a0033, #0a0a2e);
      color: white;
      text-align: center;
      padding: 20px;
    }
    
    .welcome-screen .logo {
      font-size: 60px;
      animation: bounce 1.5s infinite;
    }
    
    @keyframes bounce {
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-20px)}
    }
    
    .welcome-screen h1 {
      font-size: 2rem;
      background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 10px 0;
    }
    
    .install-btn {
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      color: white;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      box-shadow: 0 10px 30px rgba(255,107,107,0.4);
      animation: pulse 2s infinite;
      margin: 10px 0;
      display: none;
    }
    
    .install-btn.show {
      display: block;
    }
    
    @keyframes pulse {
      0%,100%{box-shadow:0 10px 30px rgba(255,107,107,0.4)}
      50%{box-shadow:0 10px 50px rgba(255,107,107,0.8)}
    }
    
    .play-browser-btn {
      background: transparent;
      color: #ffd93d;
      padding: 12px 25px;
      border-radius: 50px;
      font-size: 0.9rem;
      cursor: pointer;
      border: 2px solid #ffd93d;
      margin-top: 8px;
      display: none;
    }
    
    .play-browser-btn.show {
      display: block;
    }
    
    #gameContainer {
      display: none;
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    .nickname-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a0033, #0a0a2e);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }
    
    .nickname-input {
      background: rgba(255,255,255,0.1);
      border: 2px solid #ffd93d;
      color: white;
      padding: 15px 25px;
      font-size: 1.2rem;
      border-radius: 25px;
      text-align: center;
      margin: 20px 0;
      width: 250px;
      outline: none;
    }
    
    .confirm-btn {
      background: linear-gradient(135deg, #6bcb77, #4d96ff);
      color: white;
      padding: 12px 35px;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      font-weight: 700;
    }
    
    .lobby-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a0033, #0a0a2e);
      z-index: 500;
    }
    
    .lobby-top-bar {
      display: flex;
      align-items: center;
      padding: 10px 15px;
      gap: 12px;
    }
    
    .lobby-profile {
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.1);
      border: 2px solid #ffd93d;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .lobby-rect {
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 12px;
    }
    
    .login-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.1);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.3);
      font-weight: 600;
    }
    
    /* Кнопки внизу лобби */
    .lobby-bottom-buttons {
      position: absolute;
      bottom: 30px;
      left: 30px;
      display: flex;
      gap: 15px;
      align-items: center;
    }
    
    .play-lobby-btn {
      background: linear-gradient(135deg, #ffd93d, #ffa500);
      color: #000;
      padding: 18px 45px;
      border-radius: 15px;
      font-size: 1.3rem;
      font-weight: 900;
      cursor: pointer;
      border: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 8px 25px rgba(255,217,61,0.5);
      transition: transform 0.2s;
    }
    
    .play-lobby-btn:active {
      transform: scale(0.95);
    }
    
    .mode-select-btn {
      width: 55px;
      height: 55px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      color: white;
      transition: all 0.3s;
    }
    
    .mode-select-btn:hover {
      border-color: #ffd93d;
      background: rgba(255,217,61,0.1);
    }
    
    .collection-btn {
      position: absolute;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      width: 65px;
      height: 65px;
      background: rgba(255,255,255,0.1);
      border: 2px solid #ffd93d;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      cursor: pointer;
      color: white;
    }
    
    /* Оверлей режимов */
    .modes-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 2500;
      padding: 20px;
      color: white;
    }
    
    .modes-scroll-container {
      width: 100%;
      height: calc(100% - 80px);
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      padding: 20px 0;
    }
    
    .modes-column {
      display: inline-block;
      width: 280px;
      height: 100%;
      margin-right: 20px;
      vertical-align: top;
      white-space: normal;
    }
    
    .mode-card {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 15px;
      cursor: pointer;
      transition: all 0.3s;
      height: calc(50% - 10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    
    .mode-card:hover {
      border-color: #ffd93d;
      background: rgba(255,217,61,0.1);
    }
    
    .mode-card.selected {
      border-color: #4d96ff;
      background: rgba(77,150,255,0.2);
    }
    
    .mode-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }
    
    .mode-name {
      font-size: 1.1rem;
      font-weight: bold;
    }
    
    .collection-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      overflow-y: auto;
      padding: 20px;
      color: white;
    }
    
    .collection-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .close-btn {
      background: #ff4444;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      cursor: pointer;
    }
    
    .characters-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 10px;
    }
    
    .character-card {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 15px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .character-card.selected {
      border-color: #4d96ff;
      background: rgba(77,150,255,0.2);
    }
    
    .character-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    
    .character-name {
      font-weight: bold;
      font-size: 0.9rem;
    }
    
    .create-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 3000;
      color: white;
      padding: 20px;
      overflow-y: auto;
    }
    
    .code-editor {
      width: 100%;
      min-height: 200px;
      background: #1e1e1e;
      color: #d4d4d4;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      resize: vertical;
      margin: 8px 0;
    }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 4px;
      color: #ffd93d;
      font-size: 0.9rem;
    }
    
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    
    .save-btn {
      background: linear-gradient(135deg, #6bcb77, #4d96ff);
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      font-weight: 700;
      width: 100%;
      margin-top: 15px;
    }
    
    .game-ui {
      display: none;
    }
    
    .ui-top {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      pointer-events: none;
    }
    
    .hp-bar {
      width: 120px;
      height: 10px;
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid white;
    }
    
    .hp-fill {
      height: 100%;
      background: #00ff00;
      transition: width 0.3s;
      border-radius: 8px;
    }
    
    .score {
      color: #ffd93d;
      font-size: 16px;
      font-weight: bold;
    }
    
    .timer {
      color: white;
      font-size: 18px;
      font-weight: bold;
      background: rgba(0,0,0,0.5);
      padding: 4px 10px;
      border-radius: 12px;
    }
    
    .joystick {
      position: absolute;
      bottom: 30px;
      width: 120px;
      height: 120px;
      z-index: 20;
    }
    
    #moveJoystick { left: 25px; }
    #attackJoystick { right: 25px; }
    
    .joystick-base {
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      position: relative;
    }
    
    .joystick-thumb {
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.35);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid white;
      pointer-events: none;
    }
    
    .game-over {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
    }
    
    .game-over h2 {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    
    .game-over .final-score {
      font-size: 1.5rem;
      color: #ffd93d;
      margin-bottom: 15px;
    }
    
    .game-over button {
      background: #6bcb77;
      color: white;
      padding: 12px 35px;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      font-weight: 700;
    }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ПРИВЕТСТВИЕ -->
  <div id="welcomeScreen" class="welcome-screen">
    <div class="logo">⚔️</div>
    <h1>3D Brawl Arena</h1>
    <p id="welcomeMessage">Загрузка...</p>
    <button id="installBtn" class="install-btn" onclick="installApp()">📲 Установить игру</button>
    <button id="playBrowserBtn" class="play-browser-btn" onclick="startBrowserGame()">🎮 Играть в браузере</button>
  </div>

  <!-- ЭКРАН ВВОДА НИКА -->
  <div id="nicknameScreen" class="nickname-screen">
    <h2>🎮 Добро пожаловать!</h2>
    <p>Введите ваш никнейм</p>
    <input type="text" id="nicknameInput" class="nickname-input" placeholder="Ваш ник" maxlength="20">
    <button class="confirm-btn" onclick="saveNickname()">Продолжить</button>
  </div>

  <!-- ЛОББИ -->
  <div id="lobbyScreen" class="lobby-screen">
    <div class="lobby-top-bar">
      <div class="lobby-profile" id="lobbyProfile">👤</div>
      <div class="lobby-rect"></div>
      <button class="login-btn" onclick="showLogin()">Войти</button>
    </div>
    
    <div class="collection-btn" onclick="openCollection()">📦</div>
    
    <div class="lobby-bottom-buttons">
      <button class="mode-select-btn" onclick="openModes()" title="Выбор режима">🎯</button>
      <button class="play-lobby-btn" onclick="startGame()">ИГРАТЬ</button>
    </div>
  </div>

  <!-- ВЫБОР РЕЖИМА -->
  <div id="modesOverlay" class="modes-overlay">
    <div class="collection-header">
      <h2>Выбор режима</h2>
      <button class="close-btn" onclick="closeModes()">✕</button>
    </div>
    <div class="modes-scroll-container" id="modesScrollContainer"></div>
    <button class="save-btn" onclick="openCreateMode()" style="width: auto; margin: 10px auto; display: block;">+ Создать режим (код)</button>
  </div>

  <!-- СОЗДАНИЕ РЕЖИМА -->
  <div id="createModeScreen" class="create-screen">
    <div class="collection-header">
      <h2>Создание режима</h2>
      <button class="close-btn" onclick="closeCreateMode()">✕</button>
    </div>
    <div class="create-form">
      <div class="form-group">
        <label>Название режима</label>
        <input type="text" id="modeName" placeholder="Например: Захват флага">
      </div>
      <div class="form-group">
        <label>Инициализация режима (код)</label>
        <textarea id="modeInit" class="code-editor" placeholder="function init(scene, player, enemies, bullets) {...}"></textarea>
        <small style="color: #888;">Вызывается при старте игры</small>
      </div>
      <div class="form-group">
        <label>Игровой цикл режима (код)</label>
        <textarea id="modeLoop" class="code-editor" placeholder="function loop(scene, player, enemies, bullets, delta) {...}"></textarea>
        <small style="color: #888;">Вызывается каждый кадр</small>
      </div>
      <div class="form-group">
        <label>Условие победы (код)</label>
        <textarea id="modeWinCondition" class="code-editor" placeholder="function checkWin(player, enemies, score) { return score >= 30; }"></textarea>
      </div>
      <div class="form-group">
        <label>Настройки режима (JSON)</label>
        <textarea id="modeSettings" class="code-editor" style="min-height: 80px;">{
  "timeLimit": 120,
  "enemyCount": 4,
  "mapSize": 80
}</textarea>
      </div>
      <button class="save-btn" onclick="saveMode()">Сохранить режим</button>
    </div>
  </div>

  <!-- КОЛЛЕКЦИЯ ПЕРСОНАЖЕЙ -->
  <div id="collectionOverlay" class="collection-overlay">
    <div class="collection-header">
      <h2>Коллекция бойцов</h2>
      <button class="close-btn" onclick="closeCollection()">✕</button>
    </div>
    <div class="characters-grid" id="charactersGrid"></div>
    <button class="save-btn" onclick="openCreateCharacter()" style="margin-top: 15px;">+ Создать бойца (код)</button>
  </div>

  <!-- СОЗДАНИЕ ПЕРСОНАЖА -->
  <div id="createCharacterScreen" class="create-screen">
    <div class="collection-header">
      <h2>Создание бойца</h2>
      <button class="close-btn" onclick="closeCreateCharacter()">✕</button>
    </div>
    <div class="create-form">
      <div class="form-group">
        <label>Имя бойца</label>
        <input type="text" id="charName" placeholder="Введите имя">
      </div>
      
      <div class="form-group">
        <label>3D Модель (JavaScript - возвращает THREE.Group)</label>
        <textarea id="charModel" class="code-editor" placeholder="function createModel(scene, THREE, color) {
  const group = new THREE.Group();
  // Создайте любую 3D модель
  return group;
}"></textarea>
      </div>
      
      <div class="form-group">
        <label>Основная атака (JavaScript)</label>
        <textarea id="charAttack" class="code-editor" placeholder="function attack(player, enemies, bullets, scene, THREE, angle) {
  // Любая логика атаки
}"></textarea>
      </div>
      
      <div class="form-group">
        <label>Супер-атака (JavaScript)</label>
        <textarea id="charSuper" class="code-editor" placeholder="function superAttack(player, enemies, bullets, scene, THREE) {
  // Мощная способность
}"></textarea>
      </div>
      
      <div class="form-group">
        <label>Пассивная способность (JavaScript)</label>
        <textarea id="charPassive" class="code-editor" placeholder="function passive(player, enemies, scene) {
  // Работает постоянно
}"></textarea>
      </div>
      
      <div class="form-group">
        <label>Базовые характеристики (JSON)</label>
        <textarea id="charStats" class="code-editor" style="min-height: 80px;">{
  "hp": 100,
  "speed": 0.15,
  "reloadSpeed": 10,
  "superChargeRate": 0.5,
  "color": "#4488ff"
}</textarea>
      </div>
      
      <button class="save-btn" onclick="saveCharacter()">Сохранить бойца</button>
    </div>
  </div>

  <!-- ИГРА -->
  <div id="gameContainer">
    <div class="game-ui" id="gameUI">
      <div class="ui-top">
        <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width:100%"></div></div>
        <div class="timer" id="timer">2:00</div>
        <div class="score" id="scoreDisplay">🏆 0</div>
      </div>
      
      <div class="joystick" id="moveJoystick">
        <div class="joystick-base" id="moveBase">
          <div class="joystick-thumb" id="moveThumb"></div>
        </div>
      </div>
      
      <div class="joystick" id="attackJoystick">
        <div class="joystick-base" id="attackBase">
          <div class="joystick-thumb" id="attackThumb"></div>
        </div>
      </div>
    </div>
    
    <div class="game-over" id="gameOver">
      <h2 id="gameOverTitle">Победа!</h2>
      <div class="final-score" id="gameOverScore">🏆 0</div>
      <button onclick="restartGame()">Играть снова</button>
    </div>
  </div>

  <script>
    // ========== ДАННЫЕ ==========
    let gameModes = [
      {
        id: 'default',
        name: 'Арена',
        settings: { timeLimit: 120, enemyCount: 4, mapSize: 80 },
        initCode: 'function init(scene, player, enemies, bullets) { /* Стандартная арена */ }',
        loopCode: 'function loop(scene, player, enemies, bullets, delta) { /* Базовый цикл */ }',
        winCode: 'function checkWin(player, enemies, score) { return score >= 30; }'
      }
    ];
    
    let characters = [
      {
        id: 'default',
        name: 'Боец',
        stats: { hp: 100, speed: 0.15, reloadSpeed: 10, superChargeRate: 0.5, color: '#4488ff' },
        modelCode: `function createModel(scene, THREE, color) {
          const group = new THREE.Group();
          const bodyGeo = new THREE.CylinderGeometry(1, 1.2, 2, 8);
          const body = new THREE.Mesh(bodyGeo, new THREE.MeshLambertMaterial({ color }));
          body.position.y = 1; body.castShadow = true; group.add(body);
          const headGeo = new THREE.SphereGeometry(0.7, 8, 8);
          const head = new THREE.Mesh(headGeo, new THREE.MeshLambertMaterial({ color: 0xffdbac }));
          head.position.y = 2.4; group.add(head);
          return group;
        }`,
        attackCode: `function attack(player, enemies, bullets, scene, THREE, angle) {
          const bulletGeo = new THREE.SphereGeometry(0.3, 6, 6);
          const bullet = new THREE.Mesh(bulletGeo, new THREE.MeshLambertMaterial({ color: 0xffd93d }));
          bullet.position.set(player.position.x + Math.cos(angle)*2, 1.5, player.position.z + Math.sin(angle)*2);
          bullet.userData = { vx: Math.cos(angle)*0.6, vz: Math.sin(angle)*0.6, life: 60, damage: 20 };
          scene.add(bullet); bullets.push(bullet);
        }`,
        superCode: `function superAttack(player, enemies, bullets, scene, THREE) {
          for(let i=0; i<8; i++) {
            const angle = (i/8)*Math.PI*2;
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.4,6,6), new THREE.MeshLambertMaterial({color:0xff4444}));
            b.position.copy(player.position); b.position.y = 1.5;
            b.userData = { vx: Math.cos(angle)*0.5, vz: Math.sin(angle)*0.5, life: 40, damage: 30 };
            scene.add(b); bullets.push(b);
          }
        }`,
        passiveCode: 'function passive(player, enemies, scene) {}'
      }
    ];
    
    let selectedCharacter = characters[0];
    let selectedMode = gameModes[0];
    let playerNickname = '';

    // ========== ЗАГРУЗКА/СОХРАНЕНИЕ ==========
    function loadData() {
      const savedModes = localStorage.getItem('brawlModes');
      const savedChars = localStorage.getItem('brawlCharacters');
      if (savedModes) try { gameModes = JSON.parse(savedModes); } catch(e) {}
      if (savedChars) try { characters = JSON.parse(savedChars); } catch(e) {}
    }

    function saveAllData() {
      localStorage.setItem('brawlModes', JSON.stringify(gameModes));
      localStorage.setItem('brawlCharacters', JSON.stringify(characters));
    }

    // ========== РЕЖИМЫ ==========
    function openModes() {
      const container = document.getElementById('modesScrollContainer');
      container.innerHTML = '';
      
      // Создаем колонки по 2 режима
      const modesPerColumn = 2;
      const columnsCount = Math.ceil(gameModes.length / modesPerColumn);
      
      for (let col = 0; col < columnsCount; col++) {
        const column = document.createElement('div');
        column.className = 'modes-column';
        
        for (let row = 0; row < modesPerColumn; row++) {
          const index = col * modesPerColumn + row;
          if (index >= gameModes.length) break;
          
          const mode = gameModes[index];
          const card = document.createElement('div');
          card.className = 'mode-card';
          card.onclick = () => selectMode(mode);
          
          card.innerHTML = `
            <div class="mode-icon">${getModeIcon(mode.name)}</div>
            <div class="mode-name">${mode.name}</div>
            <small style="opacity:0.6;margin-top:5px;">⏱ ${mode.settings.timeLimit}с | 👥 ${mode.settings.enemyCount}</small>
          `;
          
          if (mode.id === selectedMode.id) card.classList.add('selected');
          column.appendChild(card);
        }
        
        container.appendChild(column);
      }
      
      document.getElementById('modesOverlay').style.display = 'block';
    }

    function getModeIcon(name) {
      if (name.includes('Захват')) return '🚩';
      if (name.includes('Выживание')) return '💀';
      if (name.includes('Босс')) return '👾';
      if (name.includes('Гонка')) return '🏁';
      return '⚔️';
    }

    function selectMode(mode) {
      selectedMode = mode;
      document.querySelectorAll('.mode-card').forEach(card => {
        card.classList.remove('selected');
        if (card.querySelector('.mode-name').textContent === mode.name) {
          card.classList.add('selected');
        }
      });
    }

    function closeModes() {
      document.getElementById('modesOverlay').style.display = 'none';
    }

    function openCreateMode() {
      document.getElementById('createModeScreen').style.display = 'block';
      document.getElementById('modesOverlay').style.display = 'none';
    }

    function closeCreateMode() {
      document.getElementById('createModeScreen').style.display = 'none';
      openModes();
    }

    function saveMode() {
      const name = document.getElementById('modeName').value;
      const initCode = document.getElementById('modeInit').value;
      const loopCode = document.getElementById('modeLoop').value;
      const winCode = document.getElementById('modeWinCondition').value;
      const settingsCode = document.getElementById('modeSettings').value;

      if (!name) return alert('Введите название режима!');
      
      let settings;
      try { settings = JSON.parse(settingsCode); } catch(e) { return alert('Ошибка JSON!'); }
      
      try {
        if (initCode) new Function('scene', 'player', 'enemies', 'bullets', initCode);
        if (loopCode) new Function('scene', 'player', 'enemies', 'bullets', 'delta', loopCode);
        if (winCode) new Function('player', 'enemies', 'score', winCode);
      } catch(e) { return alert('Ошибка в коде: ' + e.message); }

      gameModes.push({
        id: Date.now().toString(),
        name, settings, initCode, loopCode, winCode
      });
      saveAllData();
      closeCreateMode();
      alert(`Режим "${name}" создан!`);
    }

    // ========== ПЕРСОНАЖИ ==========
    function openCollection() {
      const grid = document.getElementById('charactersGrid');
      grid.innerHTML = '';
      
      characters.forEach(char => {
        const card = document.createElement('div');
        card.className = 'character-card';
        card.onclick = () => selectCharacter(char);
        
        card.innerHTML = `
          <div class="character-icon" style="color: ${char.stats.color}">⚔️</div>
          <div class="character-name">${char.name}</div>
          <small style="opacity:0.6;">❤️${char.stats.hp} ⚡${char.stats.reloadSpeed}</small>
        `;
        
        if (char.id === selectedCharacter.id) card.classList.add('selected');
        grid.appendChild(card);
      });
      
      document.getElementById('collectionOverlay').style.display = 'block';
    }

    function selectCharacter(char) {
      selectedCharacter = char;
      document.querySelectorAll('.character-card').forEach(card => {
        card.classList.remove('selected');
        if (card.querySelector('.character-name').textContent === char.name) {
          card.classList.add('selected');
        }
      });
    }

    function closeCollection() {
      document.getElementById('collectionOverlay').style.display = 'none';
    }

    function openCreateCharacter() {
      document.getElementById('createCharacterScreen').style.display = 'block';
      document.getElementById('collectionOverlay').style.display = 'none';
    }

    function closeCreateCharacter() {
      document.getElementById('createCharacterScreen').style.display = 'none';
      openCollection();
    }

    function saveCharacter() {
      const name = document.getElementById('charName').value;
      const modelCode = document.getElementById('charModel').value;
      const attackCode = document.getElementById('charAttack').value;
      const superCode = document.getElementById('charSuper').value;
      const passiveCode = document.getElementById('charPassive').value;
      const statsCode = document.getElementById('charStats').value;

      if (!name || !attackCode) return alert('Минимум: имя и код атаки!');
      
      let stats;
      try { stats = JSON.parse(statsCode); } catch(e) { return alert('Ошибка JSON!'); }
      
      try {
        if (modelCode) new Function('scene', 'THREE', 'color', 'return ' + modelCode)(null, THREE, 0xffffff);
        new Function('player', 'enemies', 'bullets', 'scene', 'THREE', 'angle', attackCode);
        if (superCode) new Function('player', 'enemies', 'bullets', 'scene', 'THREE', superCode);
        if (passiveCode) new Function('player', 'enemies', 'scene', passiveCode);
      } catch(e) { return alert('Ошибка в коде: ' + e.message); }

      characters.push({
        id: Date.now().toString(),
        name, stats, modelCode, attackCode, superCode, passiveCode
      });
      saveAllData();
      closeCreateCharacter();
      alert(`Боец "${name}" создан!`);
    }

    // ========== ИНТЕРФЕЙС ==========
    function showLogin() { alert('Функция входа будет добавлена позже'); }

    function saveNickname() {
      const nickname = document.getElementById('nicknameInput').value.trim();
      if (!nickname) return alert('Введите никнейм!');
      playerNickname = nickname;
      localStorage.setItem('playerNickname', nickname);
      document.getElementById('nicknameScreen').style.display = 'none';
      document.getElementById('lobbyScreen').style.display = 'block';
      document.getElementById('lobbyProfile').textContent = nickname[0].toUpperCase();
    }

    // ========== PWA ==========
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').classList.add('show');
      document.getElementById('welcomeMessage').textContent = 'Нажмите "Установить" для лучшего опыта';
    });

    window.installApp = async () => {
      if (!deferredPrompt) return alert('Установка недоступна');
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        document.getElementById('installBtn').classList.remove('show');
        document.getElementById('playBrowserBtn').classList.remove('show');
      }
      deferredPrompt = null;
    };

    window.addEventListener('appinstalled', () => {
      document.getElementById('welcomeScreen').style.display = 'none';
      checkFirstLaunch();
    });

    function startBrowserGame() {
      document.getElementById('welcomeScreen').style.display = 'none';
      checkFirstLaunch();
    }

    function checkFirstLaunch() {
      const hasNickname = localStorage.getItem('playerNickname');
      if (hasNickname) {
        playerNickname = hasNickname;
        document.getElementById('nicknameScreen').style.display = 'none';
        document.getElementById('lobbyScreen').style.display = 'block';
        document.getElementById('lobbyProfile').textContent = playerNickname[0].toUpperCase();
      } else {
        document.getElementById('nicknameScreen').style.display = 'flex';
      }
    }

    if (isStandalone) {
      document.getElementById('welcomeScreen').style.display = 'none';
      checkFirstLaunch();
    } else {
      document.getElementById('welcomeScreen').style.display = 'flex';
      document.getElementById('playBrowserBtn').classList.add('show');
    }

    // ========== КОМПИЛЯЦИЯ ФУНКЦИЙ ==========
    function compileAll() {
      const char = selectedCharacter;
      const mode = selectedMode;
      
      return {
        createModel: char.modelCode ? new Function('scene', 'THREE', 'color', 'return ' + char.modelCode) : null,
        attack: new Function('player', 'enemies', 'bullets', 'scene', 'THREE', 'angle', char.attackCode),
        superAttack: char.superCode ? new Function('player', 'enemies', 'bullets', 'scene', 'THREE', char.superCode) : null,
        passive: char.passiveCode ? new Function('player', 'enemies', 'scene', char.passiveCode) : null,
        modeInit: mode.initCode ? new Function('scene', 'player', 'enemies', 'bullets', mode.initCode) : null,
        modeLoop: mode.loopCode ? new Function('scene', 'player', 'enemies', 'bullets', 'delta', mode.loopCode) : null,
        modeWin: mode.winCode ? new Function('player', 'enemies', 'score', mode.winCode) : null
      };
    }

    // ========== 3D ИГРА ==========
    let scene, camera, renderer;
    let player, enemies = [], bullets = [];
    let moveAngle = null, attackAngle = null;
    let score = 0, gameTime, gameRunning = false, timerInterval;
    let playerHP, maxHP, superCharge = 0;
    let compiledFunctions;
    const W = window.innerWidth, H = window.innerHeight;

    window.startGame = () => {
      document.getElementById('lobbyScreen').style.display = 'none';
      document.getElementById('gameContainer').style.display = 'block';
      document.getElementById('gameUI').style.display = 'block';
      initGame();
    };

    function initGame() {
      compiledFunctions = compileAll();
      const settings = selectedMode.settings;
      
      maxHP = selectedCharacter.stats.hp;
      playerHP = maxHP;
      superCharge = 0;
      gameTime = settings.timeLimit || 120;
      
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87CEEB);
      scene.fog = new THREE.Fog(0x87CEEB, 30, settings.mapSize + 10);
      
      camera = new THREE.PerspectiveCamera(60, W / H, 1, 1000);
      camera.position.set(0, 40, 30);
      camera.lookAt(0, 0, 0);
      
      const oldCanvas = document.querySelector('canvas');
      if (oldCanvas) oldCanvas.remove();
      
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(W, H);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.getElementById('gameContainer').prepend(renderer.domElement);
      
      // Освещение
      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(20, 30, 10);
      light.castShadow = true;
      light.shadow.camera.left = -settings.mapSize;
      light.shadow.camera.right = settings.mapSize;
      light.shadow.camera.top = settings.mapSize;
      light.shadow.camera.bottom = -settings.mapSize;
      light.shadow.mapSize.width = 1024;
      light.shadow.mapSize.height = 1024;
      scene.add(light);
      scene.add(new THREE.AmbientLight(0x404040));
      
      // Земля
      const groundGeo = new THREE.PlaneGeometry(settings.mapSize, settings.mapSize);
      const ground = new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({ color: 0x4CAF50 }));
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);
      
      // Препятствия
      for (let i = 0; i < 12; i++) {
        const ox = (Math.random() - 0.5) * settings.mapSize * 0.8;
        const oz = (Math.random() - 0.5) * settings.mapSize * 0.8;
        const box = new THREE.Mesh(
          new THREE.BoxGeometry(2 + Math.random() * 2, 2, 2 + Math.random() * 2),
          new THREE.MeshLambertMaterial({ color: 0x8B4513 })
        );
        box.position.set(ox, 1, oz);
        box.castShadow = true;
        box.receiveShadow = true;
        scene.add(box);
      }
      
      // Игрок
      const playerColor = parseInt(selectedCharacter.stats.color.replace('#', ''), 16);
      if (compiledFunctions.createModel) {
        player = compiledFunctions.createModel(scene, THREE, playerColor);
      } else {
        player = createDefaultModel(playerColor);
      }
      player.position.set(0, 0, 0);
      
      // Враги
      enemies = [];
      for (let i = 0; i < (settings.enemyCount || 4); i++) {
        const ex = (Math.random() - 0.5) * settings.mapSize * 0.7;
        const ez = (Math.random() - 0.5) * settings.mapSize * 0.7;
        const enemyMesh = createDefaultModel(0xff4444);
        enemyMesh.position.set(ex, 0, ez);
        enemies.push({
          mesh: enemyMesh,
          hp: 60, maxHp: 60,
          alive: true, respawnTimer: 0,
          shootCooldown: 0
        });
      }
      
      bullets = [];
      score = 0;
      gameRunning = true;
      
      document.getElementById('gameOver').style.display = 'none';
      document.getElementById('hpFill').style.width = '100%';
      document.getElementById('scoreDisplay').textContent = '🏆 0';
      
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        gameTime--;
        document.getElementById('timer').textContent = `${Math.floor(gameTime/60)}:${(gameTime%60).toString().padStart(2,'0')}`;
        if (gameTime <= 0) endGame();
      }, 1000);
      
      // Инициализация режима
      if (compiledFunctions.modeInit) {
        compiledFunctions.modeInit(scene, player, enemies, bullets);
      }
      
      setupJoysticks();
      animate();
    }

    function createDefaultModel(color) {
      const group = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(1, 1.2, 2, 8),
        new THREE.MeshLambertMaterial({ color })
      );
      body.position.y = 1; body.castShadow = true; group.add(body);
      
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.7, 8, 8),
        new THREE.MeshLambertMaterial({ color: 0xffdbac })
      );
      head.position.y = 2.4; group.add(head);
      
      scene.add(group);
      return group;
    }

    function setupJoysticks() {
      setupJoystick('moveBase', 'moveThumb', (angle) => { moveAngle = angle; });
      setupJoystick('attackBase', 'attackThumb', (angle) => { attackAngle = angle; });
    }

    function setupJoystick(baseId, thumbId, callback) {
      const base = document.getElementById(baseId);
      const thumb = document.getElementById(thumbId);
      let active = false;
      
      const updatePos = (clientX, clientY) => {
        const rect = base.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = clientX - cx;
        const dy = clientY - cy;
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 45);
        const angle = Math.atan2(dy, dx);
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;
        thumb.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;
        callback(dist > 8 ? angle : null);
      };
      
      base.addEventListener('touchstart', (e) => {
        e.preventDefault();
        updatePos(e.touches[0].clientX, e.touches[0].clientY);
      });
      base.addEventListener('touchmove', (e) => {
        e.preventDefault();
        updatePos(e.touches[0].clientX, e.touches[0].clientY);
      });
      base.addEventListener('touchend', (e) => {
        e.preventDefault();
        thumb.style.transform = 'translate(-50%, -50%)';
        callback(null);
      });
    }

    function animate() {
      if (!gameRunning) return;
      requestAnimationFrame(animate);
      
      // Пассивка
      if (compiledFunctions.passive) {
        compiledFunctions.passive(player, enemies, scene);
      }
      
      // Режим loop
      if (compiledFunctions.modeLoop) {
        compiledFunctions.modeLoop(scene, player, enemies, bullets, 1);
      }
      
      // Движение
      if (moveAngle !== null) {
        player.position.x += Math.cos(moveAngle) * selectedCharacter.stats.speed;
        player.position.z += Math.sin(moveAngle) * selectedCharacter.stats.speed;
        const halfMap = selectedMode.settings.mapSize / 2 - 3;
        player.position.x = Math.max(-halfMap, Math.min(halfMap, player.position.x));
        player.position.z = Math.max(-halfMap, Math.min(halfMap, player.position.z));
      }
      
      camera.position.x = player.position.x;
      camera.position.z = player.position.z + 30;
      camera.lookAt(player.position.x, 0, player.position.z);
      
      // Атака
      if (attackAngle !== null && player && gameRunning) {
        if (!player.userData) player.userData = {};
        if (!player.userData.shootCooldown || player.userData.shootCooldown <= 0) {
          compiledFunctions.attack(player, enemies, bullets, scene, THREE, attackAngle);
          player.userData.shootCooldown = selectedCharacter.stats.reloadSpeed;
          superCharge += selectedCharacter.stats.superChargeRate;
          
          // Супер при полной зарядке
          if (superCharge >= 100 && compiledFunctions.superAttack) {
            compiledFunctions.superAttack(player, enemies, bullets, scene, THREE);
            superCharge = 0;
          }
        }
      }
      
      if (player.userData?.shootCooldown > 0) player.userData.shootCooldown--;
      
      // Враги
      enemies.forEach(enemy => {
        if (!enemy.alive) {
          enemy.respawnTimer--;
          if (enemy.respawnTimer <= 0) {
            enemy.alive = true;
            enemy.hp = enemy.maxHp;
            enemy.mesh.visible = true;
            enemy.mesh.position.set(
              (Math.random()-0.5) * selectedMode.settings.mapSize * 0.8,
              0,
              (Math.random()-0.5) * selectedMode.settings.mapSize * 0.8
            );
          }
          return;
        }
        
        const dx = player.position.x - enemy.mesh.position.x;
        const dz = player.position.z - enemy.mesh.position.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        
        if (dist > 5) {
          enemy.mesh.position.x += (dx / dist) * 0.06;
          enemy.mesh.position.z += (dz / dist) * 0.06;
        }
        
        enemy.mesh.lookAt(player.position.x, 0, player.position.z);
        
        if (dist < 25 && enemy.shootCooldown <= 0) {
          const angle = Math.atan2(dz, dx);
          const bullet = new THREE.Mesh(
            new THREE.SphereGeometry(0.25, 6, 6),
            new THREE.MeshLambertMaterial({ color: 0xff0000 })
          );
          bullet.position.copy(enemy.mesh.position);
          bullet.position.y = 1.5;
          bullet.userData = { vx: Math.cos(angle)*0.4, vz: Math.sin(angle)*0.4, life: 80, damage: 10 };
          scene.add(bullet);
          bullets.push(bullet);
          enemy.shootCooldown = 60;
        }
        if (enemy.shootCooldown > 0) enemy.shootCooldown--;
      });
      
      // Пули
      bullets = bullets.filter(b => {
        b.position.x += b.userData.vx || 0;
        b.position.z += b.userData.vz || 0;
        b.userData.life = (b.userData.life || 0) - 1;
        
        if (b.userData.life <= 0) { scene.remove(b); return false; }
        
        if (b.material.color.getHex() === 0xff0000) {
          const d = player.position.distanceTo(b.position);
          if (d < 2) {
            playerHP -= b.userData.damage || 10;
            document.getElementById('hpFill').style.width = (playerHP/maxHP*100)+'%';
            scene.remove(b);
            if (playerHP <= 0) endGame();
            return false;
          }
        } else {
          for (let enemy of enemies) {
            if (!enemy.alive) continue;
            const d = enemy.mesh.position.distanceTo(b.position);
            if (d < 2.5) {
              enemy.hp -= b.userData.damage || 20;
              scene.remove(b);
              if (enemy.hp <= 0) {
                enemy.alive = false;
                enemy.mesh.visible = false;
                enemy.respawnTimer = 120;
                score += 10;
                document.getElementById('scoreDisplay').textContent = '🏆 '+score;
              }
              return false;
            }
          }
        }
        
        return true;
      });
      
      // Проверка победы
      if (compiledFunctions.modeWin && compiledFunctions.modeWin(player, enemies, score)) {
        endGame(true);
      }
      
      renderer.render(scene, camera);
    }

    function endGame(win = false) {
      gameRunning = false;
      clearInterval(timerInterval);
      document.getElementById('gameOver').style.display = 'flex';
      document.getElementById('gameOverScore').textContent = '🏆 ' + score;
      document.getElementById('gameOverTitle').textContent = win ? 'Победа!' : 'Поражение';
    }

    window.restartGame = () => {
      clearInterval(timerInterval);
      while(scene.children.length > 0) scene.remove(scene.children[0]);
      enemies = []; bullets = [];
      document.getElementById('gameOver').style.display = 'none';
      initGame();
    };

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    loadData();
    
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
